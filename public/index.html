<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pendaftaran Santri Baru</title>
    <script src="https://www.google.com/recaptcha/api.js"></script>
  </head>
  <body>
    <h1>Formulir pendaftaran santri baru</h1>
    <p>silahkan isi data calon santri dengan benar.</p>
    <hr />
    <form action="" id="formPSB">
      <div>
        <label for="namaLengkap">Nama Lengkap:</label>
        <input
          type="text"
          id="nama"
          name="nama"
          placeholder="Contoh: Ahmad Fauzi"
          required
        />
      </div>
      <br />
      <div>
        <label for="gender">Jenis Kelamin:</label>
        <select id="gender" name="gender">
          <option value="">-- Pilih --</option>
          <option value="laki-laki">Ikhwan (Laki-laki)</option>
          <option value="perempuan">Akhwat (Perempuan)</option>
        </select>
      </div>
      <br />
      <div>
        <label for="hafalan">Jumlah hafalan (Juz):</label>
        <input
          type="number"
          id="hafalan"
          name="hafalan"
          value="0"
          min="0"
          max="30"
        />
      </div>
      <br />
      <div>
        <label for="wali">Nama Wali:</label>
        <input
          type="text"
          id="wali"
          name="wali"
          placeholder="Nama Ayah/Ibu"
          required
        />
      </div>
      <br />
      <div>
        <div
          class="g-recaptcha"
          data-sitekey="6LcF634sAAAAADMocptuG5J3SBuCA7oRDUvby_kn"
        ></div>
        <br />
        <button type="submit" id="btnSubmit">kirim pendaftar</button>
      </div>
    </form>

    <h3 id="statusPesan"></h3>

    <script>
      const form = document.getElementById("formPSB");
      const statusPesan = document.getElementById("statusPesan");

      form.onsubmit = async (e) => {
        e.preventDefault();

        statusPesan.textContent = "Sedang Memproses...";
        statusPesan.style.color = "blue";

        const formData = new FormData(form);

        try {
          const response = await fetch("/api/submit", {
            method: "POST",
            body: formData,
          });

          const hasil = await response.json();
          console.log(hasil);

          if (response.ok) {
            statusPesan.textContent = "berhasil: " + hasil.message;
            statusPesan.style.color = "green";
            form.reset();
            grecaptcha.reset();
          } else {
            statusPesan.textContent =
              "gagal: " + (hasil.error || "Terjadi kesalahan.");
            statusPesan.style.color = "red";
          }
        } catch (error) {
          statusPesan.textContent = "Gagal menghubungi server backend.";
          statusPesan.style.color = "red";
        }
      };
    </script>
  </body>
</html>
