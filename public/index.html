<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pendaftaran Santri Baru</title>
    <script src="https://www.google.com/recaptcha/api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --primary-blue: #0a192f;
        --accent-blue: #112240;
        --light-blue: #30415d;
        --white: #ffffff;
        --gold-soft: #c5a059; /* Untuk kesan mewah */
        --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at top right, #112240, #0a192f);
        color: var(--white);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow-x: hidden;
      }

      /* Animasi Background Mockup */
      body::before {
        content: "";
        position: fixed;
        top: -10%;
        left: -10%;
        width: 400px;
        height: 400px;
        background: rgba(48, 65, 93, 0.2);
        filter: blur(80px);
        border-radius: 50%;
        z-index: -1;
        animation: float 10s infinite alternate;
      }

      @keyframes float {
        from { transform: translate(0, 0); }
        to { transform: translate(100px, 50px); }
      }

      .container {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 24px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        animation: slideUp 0.8s ease-out;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      h1 {
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        text-align: center;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
        background: linear-gradient(to bottom, #ffffff, #b0b0b0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p {
        text-align: center;
        color: #8892b0;
        font-weight: 300;
        margin-bottom: 30px;
        font-size: 0.9rem;
      }

      hr {
        border: none;
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
        margin-bottom: 30px;
      }

      .form-group {
        margin-bottom: 20px;
        position: relative;
      }

      label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 8px;
        color: #ccd6f6;
        font-weight: 500;
      }

      input, select {
        width: 100%;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        transition: var(--transition);
        outline: none;
      }

      input:focus, select:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: var(--gold-soft);
        box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1);
      }

      option {
        background: var(--primary-blue);
        color: white;
      }

      button {
        width: 100%;
        padding: 14px;
        margin-top: 10px;
        background: var(--white);
        color: var(--primary-blue);
        border: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: var(--transition);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        background: #f0f0f0;
      }

      button:active {
        transform: translateY(0);
      }

      #statusPesan {
        text-align: center;
        font-size: 0.9rem;
        margin-top: 20px;
        min-height: 20px;
        font-weight: 500;
      }

      /* Recaptcha Centering */
      .g-recaptcha {
        display: flex;
        justify-content: center;
        margin: 20px 0;
      }

      /* Custom Number Input Style */
      input[type=number]::-webkit-inner-spin-button {
        opacity: 1;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <h1>Pendaftaran Santri</h1>
      <p>Silahkan isi data calon santri dengan benar.</p>
      
      <hr />

      <form action="" id="formPSB">
        <div class="form-group">
          <label for="name">Nama Lengkap</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Contoh: Ahmad Fauzi"
            required
          />
        </div>

        <div class="form-group">
          <label for="gender">Jenis Kelamin</label>
          <select id="gender" name="gender">
            <option value="">-- Pilih --</option>
            <option value="ikhwan">Ikhwan (Laki-laki)</option>
            <option value="akhwat">Akhwat (Perempuan)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="hafalan">Jumlah hafalan (Juz)</label>
          <input
            type="number"
            id="hafalan"
            name="hafalan"
            value="0"
            min="0"
            max="30"
          />
        </div>

        <div class="form-group">
          <label for="wali">Nama Wali</label>
          <input
            type="text"
            id="wali"
            name="wali"
            placeholder="Nama Ayah/Ibu"
            required
          />
        </div>

        <div class="g-recaptcha" data-sitekey="6Ldg1qUsAAAAAEaBiQ-7uf7it98Hu5ECJkwQQ3b7"></div>

        <button type="submit" id="btnSubmit">Kirim Pendaftar</button>
      </form>

      <h3 id="statusPesan"></h3>
    </div>

    <script>
      const form = document.getElementById("formPSB");
      const statusPesan = document.getElementById("statusPesan");

      form.onsubmit = async (e) => {
        e.preventDefault();

        statusPesan.textContent = "Sedang Memproses...";
        statusPesan.style.color = "#ccd6f6"; // Warna neutral saat loading

        const formData = new FormData(form);

        try {
          const response = await fetch("/api/submit", {
            method: "POST",
            body: formData,
          });

          const hasil = await response.json();

          if (response.ok) {
            statusPesan.textContent = "✓ Berhasil: " + hasil.message;
            statusPesan.style.color = "#4ade80"; // Hijau modern
            form.reset();
            grecaptcha.reset();
          } else {
            statusPesan.textContent =
              "✕ Gagal: " + (hasil.error || "Terjadi kesalahan.");
            statusPesan.style.color = "#f87171"; // Merah modern
          }
        } catch (error) {
          statusPesan.textContent = "✕ Gagal menghubungi server.";
          statusPesan.style.color = "#f87171";
        }
      };
    </script>
  </body>
</html>
